name: Feature Request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What do you want?
      description: A clear description of the feature.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why do you need this?
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples, references, etc.
    validations:
      required: false
